<div style="background: #fff; border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); padding: 20px; display: flex; flex-direction: column; transition: transform .2s; border: 2px solid #FFC300;">
  <div style="display: flex; align-items: center; margin-bottom: 8px;">
    <div style="width: 50px; height: 50px; border-radius: 50%; background-color: #FFC300; display: flex; align-items: center; justify-content: center; color: #333; font-weight: bold; margin-right: 15px;">
      <span>{{ review.user.first_name|slice:":1" }}</span>
    </div>
    <div style="display: flex; align-items: center; gap: 10px;">
  <h3 style="margin: 0; font-size: 1.4rem; color: #333;">{{ review.user.first_name }} {{ review.user.last_name }}</h3>
  <p style="margin: 0; font-size: 0.9rem; color: #999;">{{ review.created_at|date:"d.m.Y H:i" }}</p>
</div>

  </div>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
    <p style="font-size: 1rem; color: #666; line-height: 1.5; margin: 0;">{{ review.text }}</p>
    <p style="font-weight: 600; color: #FFC300; margin: 0 0 0 10px; white-space: nowrap;">{{ review.rating }} ★</p>
  </div>
</div>
